<!-- LAYOUT C v1 · Realtor demo walkthrough · /mark-weber/walkthrough.html -->
<!-- Palette matches index.html — Option C · Navy & Seaglass. Sticky bar stays Danny's brand. -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="A personal walkthrough of Mark Weber's new Naples Broker website — by Danny Namnum." />
<title>Walkthrough · Mark Weber</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* Match index.html — Option C · Navy & Seaglass */
  --cream: #EFEBE0;
  --warm-white: #F9F6EE;
  --dark: #14233A;
  --dark-soft: #2E3F58;
  --accent: #6EA8A1;
  --accent-dark: #467570;
  --accent-light: #CBDFDC;
  --sand: #DDD4C2;
  --text-muted: #5D5A53;
  --accent-rgb: 110, 168, 161;
  --dark-rgb: 20, 35, 58;
  --warm-white-rgb: 249, 246, 238;
  --hero-overlay-tint: 12, 24, 40;

  /* Sticky bar — Danny's brand, hardcoded. Do not swap. */
  --bar-bg: #F0EDE8;
  --bar-text: #3A3530;
  --bar-cta-bg: #151821;
  --bar-cta-text: #F0EDE8;
  --bar-cta-hover: #2C2A33;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  font-weight: 300;
  background: var(--warm-white);
  color: var(--dark);
  line-height: 1.6;
  min-height: 100vh;
  padding-bottom: 64px;
  text-align: center;
}
a { color: inherit; text-decoration: none; }

.wrap {
  max-width: 720px;
  margin: 0 auto;
  padding: 36px 24px 56px;
}

.wordmark {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-weight: 400;
  letter-spacing: 0.04em;
  color: var(--dark);
  margin-bottom: 22px;
  display: inline-block;
}
.wordmark .dot { color: var(--accent); }
.wordmark em {
  font-style: italic;
  font-size: 0.72em;
  letter-spacing: 0.08em;
  color: var(--accent-dark);
}

.eyebrow {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 15px;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--accent-dark);
  margin-bottom: 22px;
}

.video-aspect {
  position: relative;
  max-width: 360px;
  margin: 0 auto 40px;
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 24px 64px -16px rgba(var(--dark-rgb), 0.32);
  /* Portrait 9:16 — Danny records mobile portrait per SOP */
  padding-bottom: 177.78%;
  background: var(--dark);
}
.video-aspect iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: 0;
}

.cta-row { margin-bottom: 30px; }
.cta-primary {
  display: inline-block;
  background: var(--accent);
  color: var(--warm-white);
  padding: 16px 36px;
  font-size: 12px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  font-weight: 500;
  border-radius: 2px;
  transition: background 0.3s, transform 0.3s;
  font-family: 'DM Sans', sans-serif;
}
.cta-primary:hover { background: var(--accent-dark); transform: translateY(-1px); }
.cta-primary::after { content: ' →'; }

.how-link {
  display: inline-block;
  font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-muted);
  border-bottom: 0.5px solid rgba(var(--accent-rgb), 0.4);
  padding-bottom: 3px;
  margin-bottom: 56px;
  transition: color 0.25s, border-color 0.25s;
}
.how-link:hover { color: var(--accent-dark); border-color: var(--accent); }

.footer-line {
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-muted);
  font-weight: 400;
}
.footer-line .dot { color: var(--accent); padding: 0 6px; }

/* ===== Sticky CTA Bar — Danny's brand ===== */
.sticky-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--bar-bg);
  border-top: 1px solid rgba(0, 0, 0, 0.08);
  height: 64px;
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 20px;
}
.sticky-inner {
  max-width: 480px;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
}
.sticky-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 400;
  color: var(--bar-text);
  white-space: nowrap;
}
.sticky-cta {
  font-family: 'DM Sans', sans-serif;
  background: var(--bar-cta-bg);
  color: var(--bar-cta-text);
  font-size: 13px;
  font-weight: 600;
  padding: 11px 24px;
  border-radius: 2px;
  transition: background 0.25s, transform 0.25s;
  white-space: nowrap;
}
.sticky-cta .arrow { display: inline-block; margin-left: 6px; transition: transform 0.25s; }
.sticky-cta:hover { background: var(--bar-cta-hover); transform: translateY(-1px); }
.sticky-cta:hover .arrow { transform: translateX(3px); }

@media (max-width: 640px) {
  .wrap { padding: 28px 18px 40px; }
  .wordmark { font-size: 15px; }
  .video-aspect { max-width: 100%; }
  .cta-primary { padding: 14px 28px; font-size: 11px; }
  body { padding-bottom: 60px; }
  .sticky-bar { height: 60px; padding: 0 14px; }
  .sticky-inner { gap: 12px; }
  .sticky-label { font-size: 12px; }
  .sticky-cta { font-size: 12px; padding: 10px 18px; }
}
</style>
</head>
<body>

<div class="wrap">
  <a href="./index.html" class="wordmark">Mark Weber<span class="dot"> · </span><em>Broker · Naples</em></a>

  <p class="eyebrow">A personal walkthrough</p>

  <div class="video-aspect">
    <!-- TODO: Replace src with the actual Loom embed iframe once Danny records the walkthrough.
         REQUIRED params on src: ?hide_owner=true&hide_share=true&hide_title=true&hideEmbedTopBar=true&hideLogo=true
         REQUIRED: update padding-bottom on .video-aspect to match the % in Loom's Copy Embed snippet exactly.
         REQUIRED: set playback speed to 1x in Loom's Audience tab before embedding. -->
    <iframe
      src="about:blank"
      title="Walkthrough of Mark Weber's new website"
      allowfullscreen
      webkitallowfullscreen
      mozallowfullscreen>
    </iframe>
  </div>

  <div class="cta-row">
    <a href="./index.html" class="cta-primary">View Your Demo</a>
  </div>

  <a href="https://namnumdesign.co" class="how-link" target="_blank" rel="noopener">How this works</a>

  <p class="footer-line">Built by Danny Namnum<span class="dot">·</span>One agent, no team</p>
</div>

<div class="sticky-bar" role="region" aria-label="Schedule a call with Danny">
  <div class="sticky-inner">
    <span class="sticky-label">Like what you see?</span>
    <a href="https://fantastical.app/Namnum/Intro-conversation" class="sticky-cta" target="_blank" rel="noopener">Let's Talk<span class="arrow">→</span></a>
  </div>
</div>

</body>
</html>
